<div class="login-container container">
  <div class="login-card card glass">
    <h2>Login to <span class="gradient-text">BookNest</span></h2>
    <form *ngIf="!isLoggedIn" name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" name="username" [(ngModel)]="form.username" required #username="ngModel" [ngClass]="{ 'is-invalid': f.submitted && username.errors }" />
        <div *ngIf="f.submitted && username.errors" class="error-msg">Username is required</div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" [(ngModel)]="form.password" required minlength="6" #password="ngModel" [ngClass]="{ 'is-invalid': f.submitted && password.errors }" />
        <div *ngIf="f.submitted && password.errors" class="error-msg">
          <div *ngIf="password.errors['required']">Password is required</div>
          <div *ngIf="password.errors['minlength']">Password must be at least 6 characters</div>
        </div>
      </div>
      <div class="form-group">
        <button class="btn btn-primary w-100">Login</button>
      </div>
      <div class="form-group" *ngIf="f.submitted && isLoginFailed">
        <div class="alert alert-danger" role="alert">Login failed: {{ errorMessage }}</div>
      </div>
    </form>

    <div class="register-link">
      Don't have an account? <a routerLink="/register">Register here</a>
    </div>
  </div>
</div>
