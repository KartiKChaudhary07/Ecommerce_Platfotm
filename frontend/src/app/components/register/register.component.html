<div class="register-container container">
  <div class="register-card card glass">
    <h2>Join <span class="gradient-text">BookNest</span></h2>
    <form *ngIf="!isSuccessful" name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
      <div class="form-row">
        <div class="form-group col">
          <label for="firstName">First Name</label>
          <input type="text" name="firstName" [(ngModel)]="form.firstName" #firstName="ngModel" />
        </div>
        <div class="form-group col">
          <label for="lastName">Last Name</label>
          <input type="text" name="lastName" [(ngModel)]="form.lastName" #lastName="ngModel" />
        </div>
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" name="username" [(ngModel)]="form.username" required minlength="3" #username="ngModel" [ngClass]="{ 'is-invalid': f.submitted && username.errors }" />
        <div *ngIf="f.submitted && username.errors" class="error-msg">Username is required</div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" name="email" [(ngModel)]="form.email" required email #email="ngModel" [ngClass]="{ 'is-invalid': f.submitted && email.errors }" />
        <div *ngIf="f.submitted && email.errors" class="error-msg">Valid email is required</div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" name="password" [(ngModel)]="form.password" required minlength="6" #password="ngModel" [ngClass]="{ 'is-invalid': f.submitted && password.errors }" />
        <div *ngIf="f.submitted && password.errors" class="error-msg">Password must be at least 6 characters</div>
      </div>
      <div class="form-group">
        <button class="btn btn-primary w-100">Sign Up</button>
      </div>
      <div class="form-group" *ngIf="isSignUpFailed">
        <div class="alert alert-danger" role="alert">Signup failed: {{ errorMessage }}</div>
      </div>
    </form>

    <div class="alert alert-success" *ngIf="isSuccessful">
      Registration successful! Redirecting to login...
    </div>

    <div class="login-link">
      Already have an account? <a routerLink="/login">Login here</a>
    </div>
  </div>
</div>
