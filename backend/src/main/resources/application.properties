# H2 Database for Demo
spring.datasource.url=jdbc:h2:mem:booknest;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# MySQL (Commented out for initial run)
# spring.datasource.url=jdbc:mysql://localhost:3306/booknest?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT properties
booknest.app.jwtSecret=======================BookNestSecretKeyByKartik======================
booknest.app.jwtExpirationMs=86400000

# Server port
server.port=8080

# Logging
logging.level.org.springframework.security=DEBUG
